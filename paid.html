<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Money App</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #141e30, #243b55);
  color: white;
}

/* container */
.container {
  padding: 15px;
  max-width: 400px;
  margin: auto;
}

/* title */
h1 {
  text-align: center;
  margin-bottom: 10px;
}

/* glass card */
.card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  padding: 15px;
  margin-top: 15px;
}

/* circle */
.balance {
  width: 160px;
  height: 160px;
  border-radius: 50%;
  margin: auto;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  font-weight: bold;
  background: linear-gradient(135deg, #00f260, #0575e6);
  box-shadow: 0 0 30px rgba(0,255,150,0.4);
}

/* inputs */
input, select, button {
  width: 100%;
  padding: 12px;
  margin: 6px 0;
  border-radius: 12px;
  border: none;
  outline: none;
}

input, select {
  background: rgba(255,255,255,0.1);
  color: white;
}

button {
  background: linear-gradient(135deg, #00f260, #0575e6);
  color:white;
  font-weight: bold;
}

/* table */
table {
  width: 100%;
  margin-top: 10px;
  font-size: 13px;
}

td, th {
  padding: 6px;
  text-align: center;
}


.income {
  color: #00ff9d;
}

.expense {
  color: #ff4d4d;
}
</style>
</head>

<body>

<div class="container">
  <h1>💰 Money App</h1>

  <div class="card">
    <div class="balance" id="balance">$0</div>
  </div>

  <div class="card">
    <input type="text" id="place" placeholder="Place">
    <input type="number" id="amount" placeholder="Amount">

    <select id="type">
      <option value="income">Add Salary</option>
      <option value="expense">Spend</option>
    </select>

    <button onclick="addTransaction()">Add</button>
  </div>

  <div class="card">
    <table>
      <thead>
        <tr>
          <th>Place</th>
          <th>Amount</th>
          <th>Type</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <div class="card">
    <canvas id="chart"></canvas>
  </div>

</div>

<script>
let balance = 0;
let history = [];
let labels = [];

const ctx = document.getElementById('chart');

const chart = new Chart(ctx, {
  type: 'line',
  data: {
    labels: labels,
    datasets: [{
      label: 'Balance',
      data: history,
      tension: 0.4,
      borderWidth: 3
    }]
  }
});

function addTransaction() {
  const place = document.getElementById('place').value;
  const amount = parseFloat(document.getElementById('amount').value);
  const type = document.getElementById('type').value;

  if (!place || !amount) return;

  if (type === "income") {
    balance += amount;
  } else {
    balance -= amount;
  }

  // update circle color
  const balanceDiv = document.getElementById('balance');

  if (balance >= 0) {
    balanceDiv.style.background = "linear-gradient(135deg, #00f260, #0575e6)";
  } else {
    balanceDiv.style.background = "linear-gradient(135deg, #ff416c, #ff4b2b)";
  }

  balanceDiv.innerText = "$" + balance;

  history.push(balance);
  labels.push(place);

  chart.update();

  document.getElementById('tableBody').innerHTML += `
    <tr>
      <td>${place}</td>
      <td class="${type}">$${amount}</td>
      <td class="${type}">${type}</td>
    </tr>
  `;
}
</script>

</body>
</html>
